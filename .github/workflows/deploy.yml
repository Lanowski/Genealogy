name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Create .nojekyll
        run: touch dist/.nojekyll
      
      - name: Deploy
        run: |
          cd dist
          git init
          git config user.name "Deploy Bot"
          git config user.email "deploy@bot.com"
          git add .
          git commit -m "Deploy from GitHub Actions"
          git branch -M main
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Lanowski/Genealogy.git main:gh-pages
